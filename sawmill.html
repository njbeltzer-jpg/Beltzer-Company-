<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beltzer Company | Custom Sawmilling & Kiln Drying</title>
    <style>
        :root { --primary: #1a252f; --gold: #b08d57; --text: #2c3e50; --bg: #fdfdfd; }
        
        body { 
            font-family: 'Garamond', 'Georgia', serif; 
            color: var(--text); 
            margin: 0; 
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/white-wall.png');
            scroll-behavior: smooth;
        }

        header { 
            text-align: center; 
            padding: 100px 20px; 
            background: rgba(255,255,255,0.95);
            border-bottom: 1px solid #eee;
        }

        h1 { font-weight: 400; font-size: 3rem; letter-spacing: 6px; margin: 0; color: var(--primary); text-transform: uppercase; }
        .tagline { font-style: italic; font-size: 1.1rem; color: var(--gold); margin-top: 10px; letter-spacing: 2px; }

        .cta-group { display: flex; justify-content: center; gap: 20px; padding: 40px; flex-wrap: wrap; }
        .btn { 
            padding: 15px 40px; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            transition: 0.4s;
            border: 1px solid var(--primary);
            cursor: pointer;
            display: inline-block;
        }
        .btn-dark { background: var(--primary); color: white; }
        .btn-outline { color: var(--primary); }
        .btn:hover { background: var(--gold); color: white; border-color: var(--gold); }

        section { max-width: 1100px; margin: 80px auto; padding: 0 20px; }
        h2 { font-weight: 400; font-size: 2.2rem; text-align: center; margin-bottom: 40px; position: relative; letter-spacing: 2px; }
        h2::after { content: ''; display: block; width: 60px; height: 1px; background: var(--gold); margin: 25px auto; }

        /* Portfolio Gallery */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .gallery img { width: 100%; height: 450px; object-fit: cover; transition: 0.7s; cursor: pointer; border-radius: 2px; display: none; }
        .gallery img:hover { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .load-more-container { text-align: center; margin-top: 40px; }

        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; margin-top: 50px; }
        .service-card { background: white; padding: 40px; border: 1px solid #eee; text-align: center; }
        .service-card h3 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin-bottom: 20px; }
        .service-card p { line-height: 1.8; font-size: 1rem; color: #555; }

        .form-container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border: 1px solid #eee; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 8px; color: var(--primary); }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }

        footer { text-align: center; padding: 80px 20px; background: var(--primary); color: #fff; }
        .footer-logo { font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>The Sawmill Division</h1>
    <p class="tagline">CUSTOM MILLING | KILN DRYING | ARCHITECTURAL LUMBER</p>
</header>

<div class="cta-group">
    <a href="index.html" class="btn btn-outline">Back to Painting</a>
    <a href="#milling-form" class="btn btn-dark">Request Milling Quote</a>
</div>
