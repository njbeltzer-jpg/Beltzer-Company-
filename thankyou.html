<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | The Beltzer Company</title>
    
    <link rel="icon" type="image/png" href="Images/favicon.png">
    <link rel="apple-touch-icon" href="Images/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #1a252f; --gold: #b08d57; --text: #2c3e50; --bg: #fdfdfd; }
        
        body { 
            font-family: 'EB Garamond', 'Garamond', 'Georgia', serif; 
            color: var(--text); 
            margin: 0; 
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/white-wall.png');
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container { 
            max-width: 600px; 
            padding: 60px; 
            background: rgba(255,255,255,0.95); 
            border: 1px solid #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 { font-weight: 400; font-size: 2.5rem; letter-spacing: 4px; color: var(--primary); text-transform: uppercase; margin-bottom: 20px; }
        p { line-height: 1.8; font-size: 1.1rem; color: #555; margin-bottom: 40px; }
        
        .divider { width: 60px; height: 1px; background: var(--gold); margin: 0 auto 40px auto; }

        .btn { 
            padding: 15px 40px; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            transition: 0.4s;
            border: 1px solid var(--primary);
            cursor: pointer;
            display: inline-block;
        }
        .btn-dark { background: var(--primary); color: white; }
        .btn:hover { background: var(--gold); color: white; border-color: var(--gold); }

        .contact-direct { margin-top: 40px; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .contact-direct a { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Message Received</h1>
    <div class="divider"></div>
    <p>Thank you for reaching out to The Beltzer Company. As an owner-operator, I personally review every inquiry. You can expect a response regarding your project shortly.</p>
    
    <a href="index.html" class="btn btn-dark">Return to Home</a>

    <div class="contact-direct">
        Urgent Inquiry? <a href="sms:+14022157756">Text Nick Directly</a>
    </div>
</div>

</body>
</html>
