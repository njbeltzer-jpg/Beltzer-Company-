<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Beltzer Company | Fine Finishing & Commercial Painting</title>
    <style>
        :root { --primary: #1a252f; --gold: #b08d57; --text: #2c3e50; --bg: #fdfdfd; }
        
        body { 
            font-family: 'Garamond', 'Georgia', serif; 
            color: var(--text); 
            margin: 0; 
            background-color: var(--bg);
            background-image: url('https://www.transparenttextures.com/patterns/white-wall.png');
            scroll-behavior: smooth;
        }

        header { 
            text-align: center; 
            padding: 120px 20px; 
            background: rgba(255,255,255,0.95);
            border-bottom: 1px solid #eee;
        }

        h1 { font-weight: 400; font-size: 3.5rem; letter-spacing: 6px; margin: 0; color: var(--primary); }
        .tagline { font-style: italic; font-size: 1.1rem; color: var(--gold); margin-top: 10px; letter-spacing: 2px; }

        .cta-group { display: flex; justify-content: center; gap: 20px; padding: 40px; flex-wrap: wrap; }
        .btn { 
            padding: 15px 40px; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            transition: 0.4s;
            border: 1px solid var(--primary);
            cursor: pointer;
            display: inline-block;
        }
        .btn-dark { background: var(--primary); color: white; }
        .btn-outline { color: var(--primary); }
        .btn:hover { background: var(--gold); color: white; border-color: var(--gold); }

        section { max-width: 1100px; margin: 100px auto; padding: 0 20px; }
        h2 { font-weight: 400; font-size: 2.2rem; text-align: center; margin-bottom: 50px; position: relative; letter-spacing: 2px; }
        h2::after { content: ''; display: block; width: 60px; height: 1px; background: var(--gold); margin: 25px auto; }

        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        .service-card { background: white; padding: 40px; border: 1px solid #eee; transition: 0.3s; }
        .service-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .service-card h3 { font-weight: 400; font-size: 1.4rem; color: var(--primary); margin-top: 0; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }

        .special-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; }
        .special-item { border-left: 2px solid var(--gold); padding-left: 15px; font-size: 0.95rem; }

        .legacy-container { background: white; border: 1px solid #eee; padding: 60px; display: flex; align-items: center; gap: 50px; margin-bottom: 50px; }
        .legacy-text { flex: 2; }
        .legacy-text h2 { text-align: left; margin-top: 0; }
        .legacy-text h2::after { margin: 25px 0; }
        .legacy-years { flex: 1; text-align: center; border-left: 1px solid var(--gold); padding-left: 20px; }
        .year-number { font-size: 5rem; color: var(--gold); display: block; line-height: 1; }
        .year-label { text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; color: var(--primary); }

        /* Gallery and Load More Styling */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .gallery img { width: 100%; height: 450px; object-fit: cover; transition: 0.7s; cursor: pointer; border-radius: 2px; display: none; }
        .gallery img:hover { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .load-more-container { text-align: center; margin-top: 40px; }

        .service-area { background: rgba(26, 37, 47, 0.03); padding: 80px 20px; text-align: center; border-top: 1px solid #eee; }
        .location-grid { display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; margin-top: 30px; }
        .location-col h4 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 15px; }
        .location-col p { font-size: 0.9rem; line-height: 1.8; color: #555; }

        footer { text-align: center; padding: 100px 20px; background: var(--primary); color: #fff; }
        .footer-logo { font-size: 1.5rem; letter-spacing: 4px; margin-bottom: 10px; }
        .footer-sub { color: #888; letter-spacing: 2px; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 30px; }
        .footer-copy { color: #555; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid #2c3e50; padding-top: 40px; }
